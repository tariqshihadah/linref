name: CI

on:
  push:
    branches: [main, develop, 'release/*']
    tags: ['v*']
  pull_request:
    branches: [main, develop, 'release/*']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Run tests
        run: python -m pytest linref/tests/ -v

  package:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify no test code in wheel
        run: |
          python -m zipfile -l dist/*.whl > wheel_contents.txt
          if grep -q 'linref/tests/' wheel_contents.txt; then
            echo "ERROR: test code found in wheel!"
            cat wheel_contents.txt
            exit 1
          fi
          echo "OK: no test code in wheel"

      - name: Verify dataset files in wheel
        run: |
          python -m zipfile -l dist/*.whl > wheel_contents.txt
          for f in crashes.geojson pavement.csv roadways.geojson; do
            if ! grep -q "$f" wheel_contents.txt; then
              echo "ERROR: $f not found in wheel!"
              exit 1
            fi
          done
          echo "OK: all dataset files present"

      - name: Install from wheel and smoke test
        run: |
          python -m venv /tmp/smoke-env
          /tmp/smoke-env/bin/pip install dist/*.whl
          /tmp/smoke-env/bin/python -c "
          import linref as lr
          print('import OK')

          roads = lr.datasets.load('roadways')
          assert len(roads) > 0, 'roadways empty'
          crashes = lr.datasets.load('crashes')
          assert len(crashes) > 0, 'crashes empty'
          pave = lr.datasets.load('pavement')
          assert len(pave) > 0, 'pavement empty'
          print('datasets OK')

          roads = lr.datasets.load('roadways', set_lrs=True)
          dissolved = roads.lr.dissolve(retain=['speed_limit'])
          assert len(dissolved) > 0, 'dissolve empty'
          print('accessor OK')

          print('ALL SMOKE TESTS PASSED')
          "

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linref-dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: linref-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from CHANGELOG.md
          awk "/^## ${version} /{found=1; next} /^## [0-9]/{if(found) exit} found" CHANGELOG.md > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: false

  docs:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r docs/requirements.txt

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Execute example notebooks
        run: make -C docs execute-notebooks

      - name: Build Sphinx documentation
        run: make -C docs html
